<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Выполнение упражнения | ReFlex</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 10% 30%, #B7D8FF, #0e3f38);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      width: 55vw;
      height: 55vw;
      background: radial-gradient(circle, rgba(210, 90, 160, 0.22) 0%, rgba(140, 70, 180, 0) 70%);
      top: -20%;
      right: -15%;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: absolute;
      width: 45vw;
      height: 45vw;
      background: radial-gradient(circle, rgba(200, 100, 200, 0.2) 0%, rgba(90, 50, 130, 0) 70%);
      bottom: -10%;
      left: -10%;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    .exercise-card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 580px;
      margin: 0 auto;
      background: #2C3E50;
      backdrop-filter: blur(14px);
      border-radius: 28px;
      padding: 2rem;
      box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(80, 210, 180, 0.25);
      border: 1px solid rgba(70, 200, 170, 0.35);
    }

    .exercise-card h2 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #b2f0e0, #78e0c8);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 1.5rem;
      text-align: center;
      letter-spacing: -0.3px;
    }

    .instruction-block {
      background: rgba(10, 25, 22, 0.6);
      border-radius: 20px;
      padding: 1.5rem;
      margin-bottom: 1.8rem;
      border: 1px solid rgba(80, 210, 180, 0.25);
    }

    .instruction-block h4 {
      color: #b2f0e0;
      font-size: 1rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.75rem;
    }

    .instruction-text {
      color: rgba(210, 240, 225, 0.92);
      line-height: 1.6;
      font-size: 1rem;
      margin-bottom: 1.2rem;
      white-space: pre-line;
    }

    .instruction-block hr {
      border: none;
      height: 1px;
      background: rgba(80, 210, 180, 0.3);
      margin: 1rem 0;
    }

    .current-load {
      background: rgba(192, 95, 187, 0.15);
      border-radius: 14px;
      padding: 0.85rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .current-load strong {
      color: #b2f0e0;
      font-weight: 600;
    }

    .load-value {
      color: #e2a0e0;
      font-weight: 600;
      background: rgba(0,0,0,0.2);
      padding: 0.25rem 0.8rem;
      border-radius: 20px;
    }

    .action-buttons {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin: 1.5rem 0 1rem;
    }

    .btn {
      border: none;
      border-radius: 16px;
      padding: 1rem 1.5rem;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.2s;
      font-family: inherit;
      width: 100%;
    }

    .btn-success {
      background: linear-gradient(105deg, #2e8b57, #3cb371);
      color: white;
      box-shadow: 0 5px 12px rgba(46, 139, 86, 0.3);
    }

    .btn-success:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(46, 139, 86, 0.4);
    }

    .btn-danger {
      background: linear-gradient(105deg, #c05fbb, #aa6fcf);
      color: white;
      box-shadow: 0 5px 12px rgba(160, 70, 150, 0.3);
    }

    .btn-danger:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(190, 90, 170, 0.45);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .back-link {
      display: inline-block;
      text-align: center;
      margin-top: 1rem;
      color: rgba(180, 230, 210, 0.7);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
      border-bottom: 1px dashed rgba(210, 110, 190, 0.5);
    }

    .back-link:hover {
      color: #e2a0e0;
      border-bottom-color: #e08ed0;
    }

    @media (max-width: 560px) {
      .exercise-card {
        padding: 1.5rem;
      }
      .exercise-card h2 {
        font-size: 1.4rem;
      }
      .instruction-block {
        padding: 1rem;
      }
      .current-load {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #13352e;
    }
    ::-webkit-scrollbar-thumb {
      background: #ba78c4;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="exercise-card">
    <h2>{{ exercise.name }}</h2>
    
    <div class="instruction-block">
      <h4>📖 Инструкция</h4>
      <div class="instruction-text">{{ exercise.description }}</div>
      <hr>
      <div class="current-load">
        <strong>Текущая нагрузка:</strong>
        <span class="load-value">{{ exercise.progression.level_1 }}</span>
      </div>
    </div>

    <form method="post" action="{% url 'complete_exercise' idx %}">
      {% csrf_token %}
      <div class="action-buttons">
        <button type="submit" name="status" value="success" class="btn btn-success">
          ✅ Выполнил (Получить XP)
        </button>
        <button type="submit" name="status" value="failed" class="btn btn-danger">
          ❌ Не справился (+1 страйк)
        </button>
      </div>
    </form>

    <div style="text-align: center;">
      <a href="{% url 'profile' %}" class="back-link">← Вернуться в личный кабинет</a>
    </div>
  </div>
</body>
</html>
