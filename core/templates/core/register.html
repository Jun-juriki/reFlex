<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Регистрация</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      /* Фон — глубокая изумрудно-бирюзовая гамма, чуть светлее первого варианта */
      background: radial-gradient(circle at 10% 30%, #B7D8FF, #0e3f38);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Декоративные розово-фиолетовые абстрактные пятна */
    body::before {
      content: '';
      position: absolute;
      width: 55vw;
      height: 55vw;
      background: radial-gradient(circle, rgba(210, 90, 160, 0.22) 0%, rgba(140, 70, 180, 0) 70%);
      top: -20%;
      right: -15%;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: absolute;
      width: 45vw;
      height: 45vw;
      background: radial-gradient(circle, rgba(200, 100, 200, 0.2) 0%, rgba(90, 50, 130, 0) 70%);
      bottom: -10%;
      left: -10%;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    /* Карточка регистрации */
    .register-card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 500px;
      /* Левая граница находится по центру страницы — вы можете настроить это значение */
      margin-left: 30%;
      background: #2C3E50;
      backdrop-filter: blur(14px);
      border-radius: 16px;
      padding: 2.2rem 2rem 2.5rem;
      box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(80, 210, 180, 0.25);
      transition: all 0.2s ease;
      border: 1px solid rgba(70, 200, 170, 0.3);
    }

    /* заголовок и описание */
    .brand {
      text-align: center;
      margin-bottom: 2rem;
    }

    .brand h1 {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #b2f0e0, #78e0c8);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
    }

    .brand p {
      color: rgba(180, 230, 210, 0.85);
      font-size: 0.9rem;
      font-weight: 400;
    }

    /* форма */
    .register-form {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* группы полей */
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .input-group label {
      font-size: 0.8rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #b4f0e0;
      opacity: 0.9;
      margin-left: 0.25rem;
    }

    /* поля ввода */
    .input-group input, 
    .input-group select {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(70, 180, 160, 0.6);
      border-radius: 8px;
      padding: 0.85rem 1.2rem;
      font-size: 1rem;
      font-weight: 450;
      color: #eefaf5;
      transition: all 0.2s ease-out;
      outline: none;
      font-family: inherit;
      backdrop-filter: blur(4px);
      cursor: pointer;
    }

    /* Уменьшаем поле выбора пола — делаем его более компактным */
    .input-group.gender-compact select {
      padding: 0.85rem 1rem;
      width: 100%;
    }

    .input-group select {
      appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%2380e0c8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
      background-repeat: no-repeat;
      background-position: right 1.2rem center;
      background-size: 14px;
    }

    .input-group select option {
      background: #1a3a32;
      color: #eefaf5;
    }

    .input-group input:focus, 
    .input-group select:focus {
      border-color: #d06bc0;
      box-shadow: 0 0 0 3px rgba(208, 107, 192, 0.3);
      background: rgba(12, 28, 25, 0.85);
    }

    .input-group input::placeholder {
      color: rgba(140, 190, 175, 0.55);
      font-weight: 400;
      font-size: 0.9rem;
    }

    /* строка с возрастом и полом в одну линию на широких экранах */
    .row-fields {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .row-fields .input-group {
      flex: 1;
      min-width: 120px;
    }

    /* кнопка */
    .register-btn {
      margin-top: 0.75rem;
      background: linear-gradient(105deg, #c05fbb, #ffaa9d);
      border: none;
      padding: 0.9rem 1.2rem;
      border-radius: 10px;
      font-weight: 600;
      font-size: 1rem;
      color: white;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.2s;
      box-shadow: 0 5px 12px rgba(160, 70, 150, 0.3);
      letter-spacing: 0.3px;
      font-family: inherit;
    }

    .register-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(190, 90, 170, 0.45);
      background: linear-gradient(105deg, #cd6fc5, #b77fdf);
    }

    .register-btn:active {
      transform: translateY(1px);
    }

    /* дополнительный текст */
    .footer-note {
      text-align: center;
      margin-top: 1.8rem;
      font-size: 0.8rem;
      color: rgba(150, 210, 190, 0.8);
    }

    .footer-note a {
      color: #e2a0e0;
      text-decoration: none;
      font-weight: 500;
      border-bottom: 1px dashed rgba(210, 110, 190, 0.5);
      transition: color 0.2s;
    }

    .footer-note a:hover {
      color: #f4b0ff;
      border-bottom-color: #e08ed0;
    }

    /* чекбокс */
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      margin-top: 0.2rem;
      flex-wrap: wrap;
    }

    .checkbox-group input {
      width: 18px;
      height: 18px;
      accent-color: #bf6fcf;
      margin: 0;
      background-color: #1b4a40;
      cursor: pointer;
      border-radius: 3px;
    }

    .checkbox-group label {
      font-size: 0.8rem;
      color: #c2e6db;
      font-weight: 400;
      text-transform: none;
      letter-spacing: normal;
      opacity: 0.9;
    }

    /* сообщение */
    .message {
      margin-top: 1rem;
      text-align: center;
      font-size: 0.8rem;
      padding: 0.5rem;
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(4px);
      transition: all 0.2s;
    }

    .message.success {
      color: #a0f0d0;
      border-left: 3px solid #8fe0c0;
      background: rgba(50, 130, 110, 0.4);
    }

    .message.error {
      color: #ffb7e0;
      border-left: 3px solid #e687c0;
      background: rgba(180, 70, 130, 0.25);
    }

    /* Адаптивность */
    @media (max-width: 780px) {
      body {
        justify-content: center;
        padding: 1.2rem;
      }
      .register-card {
        margin-left: 0;
        max-width: 480px;
        width: 100%;
      }
    }

    @media (max-width: 500px) {
      .register-card {
        padding: 1.7rem 1.5rem 2rem;
      }
      .brand h1 {
        font-size: 1.7rem;
      }
      .row-fields {
        flex-direction: column;
        gap: 1rem;
      }
    }

    @media (min-width: 781px) and (max-width: 1100px) {
      .register-card {
        margin-left: 48%;
        max-width: 460px;
      }
    }

    /* скролл */
    ::-webkit-scrollbar {
      width: 5px;
    }
    ::-webkit-scrollbar-track {
      background: #13352e;
    }
    ::-webkit-scrollbar-thumb {
      background: #ba78c4;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="register-card">
    <div class="brand">
      <h1>создать аккаунт</h1>
    </div>

    <form class="register-form" id="registrationForm" action="#" method="post">
        {% csrf_token %}
      <div class="input-group">
        <label for="full_name">Имя пользователя</label>
        <input type="text" id="full_name" name="full_name" placeholder="например: Иванов Иван Иванович" autocomplete="off" required>
      </div>

      <div class="input-group">
        <label for="email">Электронная почта</label>
        <input type="email" id="email" name="email" placeholder="hello@example.com" autocomplete="off" required>
      </div>

      <!-- Строка с возрастом и полом (два поля в ряд) -->
      <div class="row-fields">
        <div class="input-group">
          <label for="age">Возраст</label>
          <input type="number" id="age" name="age" placeholder="от 18 до 120" min="18" max="120" step="1" required>
        </div>

        <!-- Поле выбора пола — уменьшенное, только женский и мужской -->
        <div class="input-group gender-compact">
          <label for="gender">Пол</label>
          <select id="gender" name="gender" required>
            <option value="" disabled selected>— выберите —</option>
            <option value="female">Женский</option>
            <option value="male">Мужской</option>
          </select>
        </div>
      </div>

      <div class="input-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" name="password" placeholder="минимум 6 символов" required>
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="terms" name="terms">
        <label for="terms">Я согласен с условиями обработки данных и политикой конфиденциальности</label>
      </div>

      <button type="submit" class="register-btn">зарегистрироваться →</button>
      <div id="formMessage" class="message" style="display: none;"></div>
    </form>

    <div class="footer-note">
      уже есть аккаунт? <a href="{% url 'login' %}">войти</a>
    </div>
  </div>

  <script>
    (function() {
      const form = document.getElementById('registrationForm');
      const usernameInput = document.getElementById('username');
      const emailInput = document.getElementById('email');
      const ageInput = document.getElementById('age');
      const genderSelect = document.getElementById('gender');
      const passwordInput = document.getElementById('password');
      const termsCheckbox = document.getElementById('terms');
      const messageDiv = document.getElementById('formMessage');

      function showMessage(text, type) {
        messageDiv.style.display = 'block';
        messageDiv.textContent = text;
        messageDiv.className = `message ${type}`;
        setTimeout(() => {
          if (messageDiv.style.display === 'block') {
            messageDiv.style.opacity = '0';
            setTimeout(() => {
              if (messageDiv.style.opacity === '0') {
                messageDiv.style.display = 'none';
                messageDiv.style.opacity = '';
              }
            }, 200);
          }
        }, 3800);
        messageDiv.style.opacity = '1';
      }

      function resetMessage() {
        messageDiv.style.display = 'none';
        messageDiv.style.opacity = '';
        messageDiv.className = 'message';
        messageDiv.textContent = '';
      }

      function validateForm() {
        const username = usernameInput.value.trim();
        const email = emailInput.value.trim();
        const age = ageInput.value.trim();
        const gender = genderSelect.value;
        const password = passwordInput.value;
        const termsAccepted = termsCheckbox.checked;

        if (!username) {
          showMessage('Пожалуйста, укажите имя пользователя.', 'error');
          usernameInput.focus();
          return false;
        }
        if (username.length < 3) {
          showMessage('Имя пользователя должно содержать минимум 3 символа.', 'error');
          usernameInput.focus();
          return false;
        }
        if (username.length > 30) {
          showMessage('Имя пользователя не должно превышать 30 символов.', 'error');
          usernameInput.focus();
          return false;
        }
        const usernameRegex = /^[a-zA-Z0-9а-яА-Я_\-\s]+$/;
        if (!usernameRegex.test(username)) {
          showMessage('Имя может содержать буквы, цифры, дефис и нижнее подчёркивание.', 'error');
          usernameInput.focus();
          return false;
        }

        if (!email) {
          showMessage('Введите адрес электронной почты.', 'error');
          emailInput.focus();
          return false;
        }
        const emailPattern = /^[^\s@]+@([^\s@.,]+\.)+[^\s@.,]{2,}$/;
        if (!emailPattern.test(email)) {
          showMessage('Пожалуйста, введите корректный email (например, name@domain.com).', 'error');
          emailInput.focus();
          return false;
        }

        // Валидация возраста
        if (!age) {
          showMessage('Укажите ваш возраст.', 'error');
          ageInput.focus();
          return false;
        }
        const ageNum = parseInt(age, 10);
        if (isNaN(ageNum) || ageNum < 18 || ageNum > 120) {
          showMessage('Возраст должен быть числом от 18 до 120 лет.', 'error');
          ageInput.focus();
          return false;
        }

        // Валидация пола — только женский или мужской
        if (!gender) {
          showMessage('Пожалуйста, выберите пол.', 'error');
          genderSelect.focus();
          return false;
        }

        if (!password) {
          showMessage('Введите пароль.', 'error');
          passwordInput.focus();
          return false;
        }
        if (password.length < 6) {
          showMessage('Пароль должен содержать не менее 6 символов.', 'error');
          passwordInput.focus();
          return false;
        }
        if (password.length > 64) {
          showMessage('Пароль слишком длинный (максимум 64 символа).', 'error');
          passwordInput.focus();
          return false;
        }

        if (!termsAccepted) {
          showMessage('Необходимо принять условия использования.', 'error');
          termsCheckbox.focus();
          return false;
        }

        return true;
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        resetMessage();

        if (!validateForm()) {
          return;
        }

        const btn = document.querySelector('.register-btn');
        const originalText = btn.innerText;
        btn.innerText = 'отправка...';
        btn.disabled = true;

        setTimeout(() => {
          const username = usernameInput.value.trim();
          const age = ageInput.value.trim();
          const genderMap = {
            'female': 'женский',
            'male': 'мужской'
          };
          const genderText = genderMap[genderSelect.value] || 'указан';
          showMessage(`✨ Регистрация выполнена! Добро пожаловать, ${username} (${age} лет, ${genderText}). ✨`, 'success');
          btn.innerText = originalText;
          btn.disabled = false;

          const card = document.querySelector('.register-card');
          card.style.transition = 'box-shadow 0.25s';
          card.style.boxShadow = '0 0 0 2px rgba(80, 210, 180, 0.5), 0 25px 40px -12px rgba(0,0,0,0.4)';
          setTimeout(() => {
            card.style.boxShadow = '0 25px 40px -12px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(80, 210, 180, 0.25)';
          }, 800);
        }, 800);
      });

      const loginLink = document.getElementById('loginMock');
      if (loginLink) {
        loginLink.addEventListener('click', (e) => {
          e.preventDefault();
          showMessage('🔮 Демо-режим: переход на страницу входа (симуляция). Интерфейс в разработке.', 'success');
        });
      }

      // Живая валидация полей
      const fields = [usernameInput, emailInput, ageInput, passwordInput];
      fields.forEach(field => {
        field.addEventListener('blur', () => {
          if (field.id === 'username' && field.value.trim() !== '' && field.value.trim().length < 3) {
            field.style.borderColor = '#e0a0c0';
          } else if (field.id === 'email' && field.value.trim() !== '') {
            const emailPattern = /^[^\s@]+@([^\s@.,]+\.)+[^\s@.,]{2,}$/;
            if (!emailPattern.test(field.value.trim())) {
              field.style.borderColor = '#e0a0c0';
            } else {
              field.style.borderColor = 'rgba(70, 180, 160, 0.7)';
            }
          } else if (field.id === 'age' && field.value.trim() !== '') {
            const ageNum = parseInt(field.value.trim(), 10);
            if (isNaN(ageNum) || ageNum < 18 || ageNum > 120) {
              field.style.borderColor = '#e0a0c0';
            } else {
              field.style.borderColor = 'rgba(70, 180, 160, 0.7)';
            }
          } else if (field.id === 'password' && field.value !== '' && field.value.length < 6) {
            field.style.borderColor = '#e0a0c0';
          } else {
            field.style.borderColor = 'rgba(70, 180, 160, 0.6)';
          }
        });
        field.addEventListener('focus', () => {
          field.style.borderColor = '#d06bc0';
          field.style.boxShadow = '0 0 0 2px rgba(208, 107, 192, 0.25)';
        });
        field.addEventListener('input', () => {
          if (field.style.borderColor === '#e0a0c0' && 
              ((field.id === 'username' && field.value.trim().length >= 3) ||
               (field.id === 'email' && /^[^\s@]+@([^\s@.,]+\.)+[^\s@.,]{2,}$/.test(field.value.trim())) ||
               (field.id === 'age' && (() => {
                 const ageNum = parseInt(field.value.trim(), 10);
                 return !isNaN(ageNum) && ageNum >= 18 && ageNum <= 120;
               })()) ||
               (field.id === 'password' && field.value.length >= 6))) {
            field.style.borderColor = 'rgba(70, 180, 160, 0.7)';
          } else if (field.style.borderColor === '#e0a0c0') {
            // keep error color
          } else {
            field.style.borderColor = 'rgba(70, 180, 160, 0.6)';
          }
        });
      });

      // Стилизация select при потере фокуса
      genderSelect.addEventListener('blur', () => {
        if (!genderSelect.value) {
          genderSelect.style.borderColor = '#e0a0c0';
        } else {
          genderSelect.style.borderColor = 'rgba(70, 180, 160, 0.7)';
        }
      });
      genderSelect.addEventListener('focus', () => {
        genderSelect.style.borderColor = '#d06bc0';
        genderSelect.style.boxShadow = '0 0 0 2px rgba(208, 107, 192, 0.25)';
      });
      genderSelect.addEventListener('change', () => {
        if (genderSelect.value) {
          genderSelect.style.borderColor = 'rgba(70, 180, 160, 0.7)';
        }
      });

      termsCheckbox.addEventListener('change', () => {
        if (termsCheckbox.checked) {
          termsCheckbox.style.boxShadow = '0 0 0 2px #cf8fcf';
          setTimeout(() => {
            termsCheckbox.style.boxShadow = '';
          }, 300);
        }
      });
    })();
  </script>
</body>
</html>
