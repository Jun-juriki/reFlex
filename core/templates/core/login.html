<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Вход на платформу</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      /* Фон — глубокая изумрудно-бирюзовая гамма */
      background: radial-gradient(circle at 10% 30%, #B7D8FF, #0e3f38);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Декоративные розово-фиолетовые абстрактные пятна */
    body::before {
      content: '';
      position: absolute;
      width: 55vw;
      height: 55vw;
      background: radial-gradient(circle, rgba(210, 90, 160, 0.22) 0%, rgba(140, 70, 180, 0) 70%);
      top: -20%;
      right: -15%;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: absolute;
      width: 45vw;
      height: 45vw;
      background: radial-gradient(circle, rgba(200, 100, 200, 0.2) 0%, rgba(90, 50, 130, 0) 70%);
      bottom: -10%;
      left: -10%;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    /* Карточка входа */
    .login-card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 460px;
      /* Левая граница находится по центру страницы — вы можете настроить это значение */
      margin-left: 30%;
      background: #2C3E50;
      backdrop-filter: blur(14px);
      border-radius: 16px;
      padding: 2.2rem 2rem 2.5rem;
      box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(80, 210, 180, 0.25);
      transition: all 0.2s ease;
      border: 1px solid rgba(70, 200, 170, 0.3);
    }

    /* заголовок и описание */
    .brand {
      text-align: center;
      margin-bottom: 2rem;
    }

    .brand h1 {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #b2f0e0, #78e0c8);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
    }

    .brand p {
      color: rgba(180, 230, 210, 0.85);
      font-size: 0.9rem;
      font-weight: 400;
    }

    /* форма */
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* группы полей */
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .input-group label {
      font-size: 0.8rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #b4f0e0;
      opacity: 0.9;
      margin-left: 0.25rem;
    }

    /* поля ввода */
    .input-group input {
      background: rgba(10, 25, 22, 0.65);
      border: 1px solid rgba(70, 180, 160, 0.6);
      border-radius: 8px;
      padding: 0.85rem 1.2rem;
      font-size: 1rem;
      font-weight: 450;
      color: #eefaf5;
      transition: all 0.2s ease-out;
      outline: none;
      font-family: inherit;
      backdrop-filter: blur(4px);
    }

    .input-group input:focus {
      border-color: #d06bc0;
      box-shadow: 0 0 0 3px rgba(208, 107, 192, 0.3);
      background: rgba(12, 28, 25, 0.85);
    }

    .input-group input::placeholder {
      color: rgba(140, 190, 175, 0.55);
      font-weight: 400;
      font-size: 0.9rem;
    }

    /* дополнительные опции (запомнить меня и забыли пароль) */
    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-top: 0.2rem;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .checkbox-group input {
      width: 17px;
      height: 17px;
      accent-color: #bf6fcf;
      margin: 0;
      cursor: pointer;
    }

    .checkbox-group label {
      font-size: 0.8rem;
      color: #c2e6db;
      font-weight: 400;
      text-transform: none;
      letter-spacing: normal;
      cursor: pointer;
    }

    .forgot-link {
      font-size: 0.8rem;
      color: #e2a0e0;
      text-decoration: none;
      border-bottom: 1px dashed rgba(210, 110, 190, 0.5);
      transition: color 0.2s;
    }

    .forgot-link:hover {
      color: #f4b0ff;
      border-bottom-color: #e08ed0;
    }

    /* кнопка входа */
    .login-btn {
      margin-top: 0.5rem;
      background: linear-gradient(105deg, #c05fbb, #ffaa9d);
      border: none;
      padding: 0.9rem 1.2rem;
      border-radius: 10px;
      font-weight: 600;
      font-size: 1rem;
      color: white;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.2s;
      box-shadow: 0 5px 12px rgba(160, 70, 150, 0.3);
      letter-spacing: 0.3px;
      font-family: inherit;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(190, 90, 170, 0.45);
      background: linear-gradient(105deg, #cd6fc5, #b77fdf);
    }

    .login-btn:active {
      transform: translateY(1px);
    }

    /* сообщение */
    .message {
      margin-top: 1rem;
      text-align: center;
      font-size: 0.8rem;
      padding: 0.5rem;
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(4px);
      transition: all 0.2s;
    }

    .message.success {
      color: #a0f0d0;
      border-left: 3px solid #8fe0c0;
      background: rgba(50, 130, 110, 0.4);
    }

    .message.error {
      color: #ffb7e0;
      border-left: 3px solid #e687c0;
      background: rgba(180, 70, 130, 0.25);
    }

    /* ссылка на регистрацию */
    .footer-note {
      text-align: center;
      margin-top: 1.8rem;
      font-size: 0.8rem;
      color: rgba(150, 210, 190, 0.8);
    }

    .footer-note a {
      color: #e2a0e0;
      text-decoration: none;
      font-weight: 500;
      border-bottom: 1px dashed rgba(210, 110, 190, 0.5);
      transition: color 0.2s;
    }

    .footer-note a:hover {
      color: #f4b0ff;
      border-bottom-color: #e08ed0;
    }

    /* Адаптивность */
    @media (max-width: 780px) {
      body {
        justify-content: center;
        padding: 1.2rem;
      }
      .login-card {
        margin-left: 0;
        max-width: 440px;
        width: 100%;
      }
    }

    @media (max-width: 500px) {
      .login-card {
        padding: 1.7rem 1.5rem 2rem;
      }
      .brand h1 {
        font-size: 1.7rem;
      }
      .form-options {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    @media (min-width: 781px) and (max-width: 1100px) {
      .login-card {
        margin-left: 48%;
        max-width: 420px;
      }
    }

    /* скролл */
    ::-webkit-scrollbar {
      width: 5px;
    }
    ::-webkit-scrollbar-track {
      background: #13352e;
    }
    ::-webkit-scrollbar-thumb {
      background: #ba78c4;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand">
      <h1>добро пожаловать</h1>
      <p>войдите в свою учётную запись</p>
    </div>

    <form class="login-form" id="loginForm" action="#" method="post">
        {% csrf_token %}
      <div class="input-group">
        <label for="email">Электронная почта</label>
        <input type="email" id="email" name="email" placeholder="hello@example.com" autocomplete="off" required>
      </div>

      <div class="input-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" name="password" placeholder="••••••" required>
      </div>

      <div class="form-options">
        <div class="checkbox-group">
          <input type="checkbox" id="remember" name="remember">
          <label for="remember">Запомнить меня</label>
        </div>
        <a href="#" id="forgotPassword" class="forgot-link">Забыли пароль?</a>
      </div>

      <button type="submit" class="login-btn">войти →</button>
      <div id="formMessage" class="message" style="display: none;"></div>
    </form>

    <div class="footer-note">
      Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a>
    </div>
  </div>

  <script>
    (function() {
      const form = document.getElementById('loginForm');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const rememberCheckbox = document.getElementById('remember');
      const messageDiv = document.getElementById('formMessage');

      function showMessage(text, type) {
        messageDiv.style.display = 'block';
        messageDiv.textContent = text;
        messageDiv.className = `message ${type}`;
        setTimeout(() => {
          if (messageDiv.style.display === 'block') {
            messageDiv.style.opacity = '0';
            setTimeout(() => {
              if (messageDiv.style.opacity === '0') {
                messageDiv.style.display = 'none';
                messageDiv.style.opacity = '';
              }
            }, 200);
          }
        }, 3800);
        messageDiv.style.opacity = '1';
      }

      function resetMessage() {
        messageDiv.style.display = 'none';
        messageDiv.style.opacity = '';
        messageDiv.className = 'message';
        messageDiv.textContent = '';
      }

      function validateForm() {
        const email = emailInput.value.trim();
        const password = passwordInput.value;

        if (!email) {
          showMessage('Введите адрес электронной почты.', 'error');
          emailInput.focus();
          return false;
        }
        const emailPattern = /^[^\s@]+@([^\s@.,]+\.)+[^\s@.,]{2,}$/;
        if (!emailPattern.test(email)) {
          showMessage('Пожалуйста, введите корректный email (например, name@domain.com).', 'error');
          emailInput.focus();
          return false;
        }

        if (!password) {
          showMessage('Введите пароль.', 'error');
          passwordInput.focus();
          return false;
        }
        if (password.length < 6) {
          showMessage('Пароль должен содержать не менее 6 символов.', 'error');
          passwordInput.focus();
          return false;
        }

        return true;
      }

      // Обработчик отправки формы
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        resetMessage();

        if (!validateForm()) {
          return;
        }

        const btn = document.querySelector('.login-btn');
        const originalText = btn.innerText;
        btn.innerText = 'вход...';
        btn.disabled = true;

        setTimeout(() => {
          const email = emailInput.value.trim();
          const remember = rememberCheckbox.checked;
          const rememberText = remember ? ' (сеанс будет сохранён)' : '';
          
          showMessage(`✅ Добро пожаловать! Вы успешно вошли как ${email}.${rememberText}`, 'success');
          btn.innerText = originalText;
          btn.disabled = false;

          // Эффект подсветки карточки
          const card = document.querySelector('.login-card');
          card.style.transition = 'box-shadow 0.25s';
          card.style.boxShadow = '0 0 0 2px rgba(80, 210, 180, 0.5), 0 25px 40px -12px rgba(0,0,0,0.4)';
          setTimeout(() => {
            card.style.boxShadow = '0 25px 40px -12px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(80, 210, 180, 0.25)';
          }, 800);
        }, 800);
      });

      // Ссылка "Забыли пароль"
      const forgotLink = document.getElementById('forgotPassword');
      if (forgotLink) {
        forgotLink.addEventListener('click', (e) => {
          e.preventDefault();
          showMessage('🔐 Инструкция по восстановлению пароля отправлена на вашу почту (демо-режим).', 'success');
        });
      }

      // Ссылка на регистрацию
      const registerLink = document.getElementById('registerLink');
      if (registerLink) {
        registerLink.addEventListener('click', (e) => {
          e.preventDefault();
          showMessage('📝 Перенаправление на страницу регистрации (демо-режим).', 'success');
          // В реальном проекте здесь был бы переход на страницу регистрации
        });
      }

      // Живая валидация полей (визуальная обратная связь)
      const fields = [emailInput, passwordInput];
      fields.forEach(field => {
        field.addEventListener('blur', () => {
          if (field.id === 'email' && field.value.trim() !== '') {
            const emailPattern = /^[^\s@]+@([^\s@.,]+\.)+[^\s@.,]{2,}$/;
            if (!emailPattern.test(field.value.trim())) {
              field.style.borderColor = '#e0a0c0';
            } else {
              field.style.borderColor = 'rgba(70, 180, 160, 0.7)';
            }
          } else if (field.id === 'password' && field.value !== '' && field.value.length < 6) {
            field.style.borderColor = '#e0a0c0';
          } else {
            field.style.borderColor = 'rgba(70, 180, 160, 0.6)';
          }
        });
        
        field.addEventListener('focus', () => {
          field.style.borderColor = '#d06bc0';
          field.style.boxShadow = '0 0 0 2px rgba(208, 107, 192, 0.25)';
        });
        
        field.addEventListener('input', () => {
          if (field.style.borderColor === '#e0a0c0' && 
              ((field.id === 'email' && /^[^\s@]+@([^\s@.,]+\.)+[^\s@.,]{2,}$/.test(field.value.trim())) ||
               (field.id === 'password' && field.value.length >= 6))) {
            field.style.borderColor = 'rgba(70, 180, 160, 0.7)';
          } else if (field.style.borderColor === '#e0a0c0') {
            // сохраняем цвет ошибки
          } else {
            field.style.borderColor = 'rgba(70, 180, 160, 0.6)';
          }
        });
      });

      // Эффект для чекбокса при клике
      rememberCheckbox.addEventListener('change', () => {
        if (rememberCheckbox.checked) {
          rememberCheckbox.style.boxShadow = '0 0 0 2px #cf8fcf';
          setTimeout(() => {
            rememberCheckbox.style.boxShadow = '';
          }, 300);
        }
      });

      // Если есть сохранённые данные в localStorage (демо-функция "запомнить меня")
      // Простая имитация: при загрузке страницы, если был выбран "запомнить меня" в прошлый раз
      // Для демонстрации просто загружаем последний email, если он сохранён
      const savedEmail = localStorage.getItem('remembered_email');
      if (savedEmail) {
        emailInput.value = savedEmail;
        rememberCheckbox.checked = true;
        showMessage('🔓 Обнаружены сохранённые данные для входа.', 'success');
        setTimeout(() => {
          if (messageDiv.style.display === 'block') {
            messageDiv.style.opacity = '0';
            setTimeout(() => {
              if (messageDiv.style.opacity === '0') {
                messageDiv.style.display = 'none';
                messageDiv.style.opacity = '';
              }
            }, 1500);
          }
        }, 2000);
      }

      // При успешном входе с чекбоксом "запомнить меня" сохраняем email
      // Добавляем обработчик в уже существующий submit (расширяем логику)
      const originalSubmitHandler = form.onsubmit;
      form.addEventListener('submit', function(e) {
        // Не перезаписываем, а дополняем — используем флаг, чтобы не дублировать
        if (window._loginExtraProcessed) return;
        window._loginExtraProcessed = true;
        setTimeout(() => { window._loginExtraProcessed = false; }, 500);
        
        if (validateForm() && rememberCheckbox.checked) {
          localStorage.setItem('remembered_email', emailInput.value.trim());
        } else if (!rememberCheckbox.checked) {
          localStorage.removeItem('remembered_email');
        }
      });
    })();
  </script>
</body>
</html>
