<form method="post" style="max-width: 400px; margin: 100px auto; text-align: center;">
    {% csrf_token %}
    <h2>Вход в профиль</h2>
    <input type="email" name="email" placeholder="Email" required style="width: 100%; padding: 10px; margin-bottom: 10px;">
    <input type="password" name="password" placeholder="Пароль" required style="width: 100%; padding: 10px; margin-bottom: 10px;">
    <button type="submit" style="width: 100%; padding: 15px; background: #2196F3; color: white; border: none;">Войти</button>
</form>
